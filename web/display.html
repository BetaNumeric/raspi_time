<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Volume Display</title>
    <style>
        :root {
            --fg: #f7f3ee;
            --muted: rgba(247, 243, 238, 0.72);
            --line: rgba(255, 255, 255, 0.12);
            --panel: rgba(0, 0, 0, 0.38);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: var(--fg);
            font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
        }

        body {
            position: relative;
            cursor: none;
        }

        #displayCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        #hiddenVideo {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .hud {
            position: absolute;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            pointer-events: none;
        }

        .hud-top { top: 20px; }
        .hud-bottom { bottom: 20px; align-items: flex-end; }

        .hud-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 14px 16px;
            min-width: 180px;
            backdrop-filter: blur(16px);
        }

        .hud-label {
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .hud-value {
            font-size: clamp(1rem, 2vw, 1.7rem);
            letter-spacing: -0.04em;
            font-weight: 800;
        }

        .countdown {
            position: absolute;
            inset: 0;
            display: none;
            place-items: center;
            text-align: center;
            background: radial-gradient(circle, rgba(255, 113, 70, 0.18), rgba(0, 0, 0, 0.3) 45%, rgba(0, 0, 0, 0.72));
            pointer-events: none;
        }

        .countdown-number {
            font-size: min(34vw, 16rem);
            line-height: 1;
            font-weight: 900;
            letter-spacing: -0.08em;
        }

        .countdown-copy {
            margin-top: 8px;
            color: var(--muted);
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        #armButton {
            position: absolute;
            right: 20px;
            top: 20px;
            z-index: 5;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--fg);
            font: inherit;
            cursor: pointer;
        }

        body.clean .hud,
        body.clean #armButton {
            display: none;
        }

        body.clean .countdown {
            background: transparent;
        }
    </style>
</head>
<body class="clean">
    <canvas id="displayCanvas"></canvas>
    <video id="hiddenVideo" muted playsinline preload="auto"></video>

    <div class="hud hud-top">
        <div class="hud-card"><div class="hud-label">Sequence</div><div class="hud-value" id="sequenceName">Waiting</div></div>
        <div class="hud-card"><div class="hud-label">Mode</div><div class="hud-value" id="modeLabel">Idle</div></div>
    </div>

    <div class="hud hud-bottom">
        <div class="hud-card"><div class="hud-label">Position</div><div class="hud-value" id="positionLabel">0.0%</div></div>
        <div class="hud-card"><div class="hud-label">Frame</div><div class="hud-value" id="frameLabel">Ready</div></div>
    </div>

    <div id="countdown" class="countdown">
        <div>
            <div class="countdown-number" id="countdownNumber">3</div>
            <div class="countdown-copy">Sequence Starting</div>
        </div>
    </div>

    <button id="armButton" type="button">Arm Display</button>
    <script>
        const query = new URLSearchParams(window.location.search);
        const showHud = query.get("hud") === "1";
        const showCountdown = query.get("countdown") === "1";

        if (showHud) {
            document.body.classList.remove("clean");
        }

        const canvas = document.getElementById("displayCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });
        const hiddenVideo = document.getElementById("hiddenVideo");
        const sequenceName = document.getElementById("sequenceName");
        const modeLabel = document.getElementById("modeLabel");
        const positionLabel = document.getElementById("positionLabel");
        const frameLabel = document.getElementById("frameLabel");
        const countdown = document.getElementById("countdown");
        const countdownNumber = document.getElementById("countdownNumber");
        const armButton = document.getElementById("armButton");

        let currentState = null;
        let currentSequence = null;
        let currentSequenceId = null;
        let wakeLock = null;
        let lastDrawnImageUrl = null;
        let activeImage = null;
        let canvasRevision = 0;
        let lastRenderedAssetKey = null;
        let lastRenderedCanvasRevision = -1;
        let lastStateReceivedAtMs = performance.now();
        let renderLoopId = null;
        let lastPreloadCenterIndex = null;
        let lastPreloadDirection = 0;

        const IMAGE_PRELOAD_IDLE_RADIUS = 10;
        const IMAGE_PRELOAD_BEHIND = 8;
        const IMAGE_PRELOAD_AHEAD = 64;
        const IMAGE_PRELOAD_MIN_STEP = 6;
        const IMAGE_CACHE_LIMIT = 120;
        const NEAREST_LOADED_RADIUS = 32;
        const imageCache = new Map();

        const DEFAULT_LIFT_STROKE_CM = 48;
        const MIN_SEQUENCE_HEIGHT_CM = 0.01;
        const DEFAULT_EXTEND_SEC = 23.75;
        const DEFAULT_RETRACT_SEC = 22.0;
        const MAX_SEQUENCE_PLAYBACK_FPS = 30;
        const clamp = (value, minimum, maximum) => Math.max(minimum, Math.min(maximum, value));

        function sequenceSpan(sequence) {
            const strokeCm = Math.max(
                MIN_SEQUENCE_HEIGHT_CM,
                Number(sequence.lift_stroke_cm || DEFAULT_LIFT_STROKE_CM)
            );
            const startCm = clamp(Number(sequence.start_cm || 0), 0, strokeCm - MIN_SEQUENCE_HEIGHT_CM);
            const configuredEndCm = Number(sequence.end_cm);
            const fallbackHeightCm = Number(sequence.volume_height_cm || strokeCm);
            const endCm = Number.isFinite(configuredEndCm)
                ? clamp(configuredEndCm, startCm + MIN_SEQUENCE_HEIGHT_CM, strokeCm)
                : clamp(startCm + fallbackHeightCm, startCm + MIN_SEQUENCE_HEIGHT_CM, strokeCm);
            return { strokeCm, startCm, endCm, heightCm: endCm - startCm };
        }

        function playbackRatioForPosition(sequence, pct) {
            const { strokeCm, startCm, endCm } = sequenceSpan(sequence);
            const positionCm = (clamp(Number(pct || 0), 0, 100) / 100) * strokeCm;

            if (positionCm < startCm) {
                return sequence.outside_playback === "hold" ? 0 : null;
            }
            if (positionCm > endCm) {
                return sequence.outside_playback === "hold" ? 1 : null;
            }
            return clamp((positionCm - startCm) / (endCm - startCm), 0, 1);
        }

        function frameRateLimitForSequence(sequence, direction = 1, state = currentState) {
            if (!sequence || !sequence.frame_count || sequence.frame_count <= 1) {
                return { requestedFps: 0, effectiveFps: 0, stride: 1, durationSec: 0 };
            }

            const { strokeCm, heightCm } = sequenceSpan(sequence);
            const travelDirection = direction < 0 ? -1 : 1;
            const strokeSec = travelDirection > 0
                ? Number(state?.extend_sec || DEFAULT_EXTEND_SEC)
                : Number(state?.retract_sec || DEFAULT_RETRACT_SEC);
            const duty = clamp(Number(state?.speed_duty || 1), 0.1, 1);
            const durationSec = ((heightCm / strokeCm) * Math.max(0.01, strokeSec)) / duty;
            const requestedFps = (Number(sequence.frame_count) - 1) / Math.max(0.01, durationSec);
            const stride = Math.max(1, Math.ceil(requestedFps / MAX_SEQUENCE_PLAYBACK_FPS));
            return {
                requestedFps,
                effectiveFps: requestedFps / stride,
                stride,
                durationSec
            };
        }

        function quantizeFrameIndex(index, frameCount, stride) {
            if (stride <= 1 || frameCount <= 1) return index;
            const lastIndex = frameCount - 1;
            if (index <= 0) return 0;
            if (index >= lastIndex) return lastIndex;
            return clamp(Math.round(index / stride) * stride, 0, lastIndex);
        }

        function frameIndexForSequencePosition(sequence, pct, direction = 1) {
            if (!sequence) return { index: 0, rawIndex: 0, stride: 1 };
            const ratio = playbackRatioForPosition(sequence, pct);
            if (ratio == null) return null;
            if (!sequence.frame_count || sequence.frame_count <= 1) {
                return { index: 0, rawIndex: 0, stride: 1 };
            }
            const frameCount = Number(sequence.frame_count);
            const rawIndex = Math.min(frameCount - 1, Math.round(ratio * (frameCount - 1)));
            const limit = frameRateLimitForSequence(sequence, direction, currentState);
            return {
                index: quantizeFrameIndex(rawIndex, frameCount, limit.stride),
                rawIndex,
                stride: limit.stride,
                requestedFps: limit.requestedFps,
                effectiveFps: limit.effectiveFps
            };
        }

        function resizeCanvas() {
            const dpr = Math.max(1, window.devicePixelRatio || 1);
            const width = Math.round(window.innerWidth * dpr);
            const height = Math.round(window.innerHeight * dpr);
            if (canvas.width !== width || canvas.height !== height) {
                canvas.width = width;
                canvas.height = height;
                canvasRevision += 1;
                lastRenderedAssetKey = null;
            }
            drawCurrentFrame();
        }

        function clearCanvas() {
            lastRenderedAssetKey = null;
            lastRenderedCanvasRevision = -1;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawAsset(source, sourceWidth, sourceHeight, assetKey = null) {
            if (assetKey && assetKey === lastRenderedAssetKey && lastRenderedCanvasRevision === canvasRevision) {
                return;
            }

            clearCanvas();
            if (!source || !sourceWidth || !sourceHeight) {
                return;
            }

            const canvasAspect = canvas.width / canvas.height;
            const sourceAspect = sourceWidth / sourceHeight;
            let drawWidth = canvas.width;
            let drawHeight = canvas.height;

            if (sourceAspect > canvasAspect) {
                drawHeight = drawWidth / sourceAspect;
            } else {
                drawWidth = drawHeight * sourceAspect;
            }

            const x = (canvas.width - drawWidth) / 2;
            const y = (canvas.height - drawHeight) / 2;
            ctx.drawImage(source, x, y, drawWidth, drawHeight);

            if (assetKey) {
                lastRenderedAssetKey = assetKey;
                lastRenderedCanvasRevision = canvasRevision;
            }
        }

        function clearImageCache() {
            imageCache.clear();
            activeImage = null;
            lastDrawnImageUrl = null;
            lastRenderedAssetKey = null;
            lastRenderedCanvasRevision = -1;
            lastPreloadCenterIndex = null;
            lastPreloadDirection = 0;
        }

        function rememberImage(url, entry) {
            if (imageCache.has(url)) {
                imageCache.delete(url);
            }
            imageCache.set(url, entry);

            while (imageCache.size > IMAGE_CACHE_LIMIT) {
                const oldestUrl = imageCache.keys().next().value;
                imageCache.delete(oldestUrl);
            }
        }

        function getImageCacheEntry(url) {
            const entry = imageCache.get(url);
            if (!entry) {
                return null;
            }
            rememberImage(url, entry);
            return entry;
        }

        function requestImage(url, onLoad = null) {
            const cachedEntry = getImageCacheEntry(url);
            if (cachedEntry) {
                if (cachedEntry.loaded && cachedEntry.image.naturalWidth) {
                    if (onLoad) onLoad(cachedEntry.image);
                } else if (onLoad) {
                    cachedEntry.callbacks.push(onLoad);
                }
                return cachedEntry.image;
            }

            const image = new Image();
            const entry = { image, loaded: false, callbacks: onLoad ? [onLoad] : [] };
            image.decoding = "async";
            image.loading = "eager";
            image.addEventListener("load", () => {
                const finish = () => {
                    entry.loaded = true;
                    const callbacks = entry.callbacks.splice(0);
                    for (const callback of callbacks) {
                        callback(image);
                    }
                    scheduleRender();
                };
                if (image.decode) {
                    image.decode().then(finish).catch(finish);
                } else {
                    finish();
                }
            }, { once: true });
            image.addEventListener("error", () => {
                imageCache.delete(url);
            }, { once: true });
            rememberImage(url, entry);
            image.src = url;
            return image;
        }

        function loadedImageForFrame(index) {
            if (!currentSequence || currentSequence.kind !== "images") {
                return null;
            }
            const url = currentSequence.frame_urls[index];
            if (!url) {
                return null;
            }
            const entry = getImageCacheEntry(url);
            if (entry && entry.loaded && entry.image.naturalWidth) {
                return { image: entry.image, url, index };
            }
            return null;
        }

        function nearestLoadedFrame(centerIndex, direction = 0, stride = 1) {
            const exact = loadedImageForFrame(centerIndex);
            if (exact) {
                return exact;
            }

            const step = Math.max(1, stride);
            const maxOffset = Math.max(NEAREST_LOADED_RADIUS, step * 4);
            for (let offset = step; offset <= maxOffset; offset += step) {
                const firstIndex = direction < 0 ? centerIndex + offset : centerIndex - offset;
                const secondIndex = direction < 0 ? centerIndex - offset : centerIndex + offset;
                const first = firstIndex >= 0 && firstIndex < currentSequence.frame_count
                    ? loadedImageForFrame(firstIndex)
                    : null;
                if (first) {
                    return first;
                }
                const second = secondIndex >= 0 && secondIndex < currentSequence.frame_count
                    ? loadedImageForFrame(secondIndex)
                    : null;
                if (second) {
                    return second;
                }
            }

            return null;
        }

        function preloadNearbyFrames(centerIndex, direction = 0, stride = 1) {
            if (!currentSequence || currentSequence.kind !== "images") {
                return;
            }

            const step = Math.max(1, stride);
            if (
                lastPreloadCenterIndex != null
                && lastPreloadDirection === direction
                && Math.abs(centerIndex - lastPreloadCenterIndex) < Math.max(IMAGE_PRELOAD_MIN_STEP, step)
            ) {
                return;
            }

            lastPreloadCenterIndex = centerIndex;
            lastPreloadDirection = direction;

            const behind = direction === 0 ? IMAGE_PRELOAD_IDLE_RADIUS : IMAGE_PRELOAD_BEHIND;
            const ahead = direction === 0 ? IMAGE_PRELOAD_IDLE_RADIUS : IMAGE_PRELOAD_AHEAD;
            const start = Math.max(0, centerIndex - (direction < 0 ? ahead : behind));
            const end = Math.min(currentSequence.frame_count - 1, centerIndex + (direction < 0 ? behind : ahead));
            const firstIndex = Math.max(0, Math.floor(start / step) * step);

            for (let index = firstIndex; index <= end; index += step) {
                if (index < start) {
                    continue;
                }
                const url = currentSequence.frame_urls[index];
                if (url) {
                    requestImage(url);
                }
            }
        }

        function describeMode(state) {
            if (state.switch_direction !== 0) return state.switch_direction > 0 ? "Manual extend" : "Manual retract";
            if (state.is_cycling) return "Cycle mode";
            if (state.countdown_remaining > 0) return `Countdown ${state.countdown_remaining}s`;
            if (state.is_moving && state.is_paused) return "Paused";
            if (state.is_moving) return "Moving";
            return "Idle";
        }

        function syncSequenceMetadataFromState(sequence, state) {
            if (!sequence || !state || sequence.id !== state.selected_sequence_id) {
                return;
            }
            sequence.lift_stroke_cm = state.lift_stroke_cm || sequence.lift_stroke_cm || DEFAULT_LIFT_STROKE_CM;
            sequence.start_cm = state.selected_sequence_start_cm ?? sequence.start_cm ?? 0;
            sequence.end_cm = state.selected_sequence_end_cm ?? sequence.end_cm;
            sequence.volume_height_cm = state.selected_sequence_volume_height_cm ?? sequence.volume_height_cm;
            sequence.outside_playback = state.selected_sequence_outside_playback || sequence.outside_playback || "black";
            sequence.frame_count = state.selected_sequence_frame_count || sequence.frame_count;
        }

        function movementDirectionForState(state, positionPct = null) {
            if (!state || !state.is_moving || state.is_paused) {
                return 0;
            }
            if (state.switch_direction !== 0) {
                return state.switch_direction > 0 ? 1 : -1;
            }

            const currentPct = Number(positionPct ?? state.position_pct ?? 0);
            const activeTarget = Number(state.active_target_pct);
            if (Number.isFinite(activeTarget) && Math.abs(activeTarget - currentPct) > 0.05) {
                return activeTarget > currentPct ? 1 : -1;
            }

            const target = Number(state.target_pct);
            if (Number.isFinite(target) && Math.abs(target - currentPct) > 0.05) {
                return target > currentPct ? 1 : -1;
            }

            return 0;
        }

        function estimatedPositionPct() {
            if (!currentState) {
                return 0;
            }

            const basePct = clamp(Number(currentState.position_pct || 0), 0, 100);
            const direction = movementDirectionForState(currentState, basePct);
            if (direction === 0) {
                return basePct;
            }

            const strokeSec = direction > 0
                ? Number(currentState.extend_sec || DEFAULT_EXTEND_SEC)
                : Number(currentState.retract_sec || DEFAULT_RETRACT_SEC);
            const duty = clamp(Number(currentState.speed_duty || 1), 0.1, 1);
            const elapsedSec = Math.max(0, (performance.now() - lastStateReceivedAtMs) / 1000);
            const estimated = basePct + ((100 / Math.max(0.01, strokeSec)) * duty * direction * elapsedSec);
            const activeTarget = Number(currentState.active_target_pct);

            if (Number.isFinite(activeTarget)) {
                return direction > 0
                    ? clamp(estimated, basePct, activeTarget)
                    : clamp(estimated, activeTarget, basePct);
            }

            return clamp(estimated, 0, 100);
        }

        function shouldAnimateDisplay() {
            return Boolean(currentState && currentState.is_moving && !currentState.is_paused);
        }

        function renderAnimationFrame() {
            renderLoopId = null;
            drawCurrentFrame();
            if (shouldAnimateDisplay()) {
                renderLoopId = requestAnimationFrame(renderAnimationFrame);
            }
        }

        function scheduleRender() {
            if (renderLoopId == null) {
                renderLoopId = requestAnimationFrame(renderAnimationFrame);
            }
        }

        async function apiGet(url) {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) throw new Error(`GET ${url} failed`);
            return response.json();
        }

        async function loadSequence(sequenceId) {
            if (!sequenceId) {
                currentSequence = null;
                currentSequenceId = null;
                clearImageCache();
                hiddenVideo.pause();
                hiddenVideo.removeAttribute("src");
                delete hiddenVideo.dataset.src;
                hiddenVideo.load();
                scheduleRender();
                return;
            }

            clearImageCache();
            currentSequence = await apiGet(`/api/sequence?id=${encodeURIComponent(sequenceId)}`);
            currentSequenceId = sequenceId;
            syncSequenceMetadataFromState(currentSequence, currentState);

            if (currentSequence.kind === "video" && hiddenVideo.dataset.src !== currentSequence.media_url) {
                hiddenVideo.pause();
                hiddenVideo.dataset.src = currentSequence.media_url;
                hiddenVideo.src = currentSequence.media_url;
                hiddenVideo.load();
            }

            scheduleRender();
        }

        function updateOverlays(displayPositionPct = null) {
            if (!currentState) {
                sequenceName.textContent = "Waiting";
                modeLabel.textContent = "Idle";
                positionLabel.textContent = "0.0%";
                frameLabel.textContent = "Ready";
                countdown.style.display = "none";
                return;
            }

            sequenceName.textContent = currentState.selected_sequence_name || "Waiting";
            modeLabel.textContent = describeMode(currentState);
            const positionPct = displayPositionPct == null ? currentState.position_pct : displayPositionPct;
            positionLabel.textContent = `${positionPct.toFixed(1)}%`;

            if (showCountdown && currentState.countdown_remaining > 0) {
                countdown.style.display = "grid";
                countdownNumber.textContent = currentState.countdown_remaining;
            } else {
                countdown.style.display = "none";
            }
        }

        function drawCurrentFrame() {
            const displayPositionPct = estimatedPositionPct();
            updateOverlays(displayPositionPct);

            if (!currentState || !currentSequence) {
                clearCanvas();
                return;
            }

            if (currentSequence.kind === "images") {
                const direction = movementDirectionForState(currentState, displayPositionPct);
                const frame = frameIndexForSequencePosition(currentSequence, displayPositionPct, direction || 1);
                if (frame == null) {
                    frameLabel.textContent = "Outside sequence";
                    clearCanvas();
                    return;
                }
                const index = frame.index;
                const imageUrl = currentSequence.frame_urls[index];
                const strideLabel = frame.stride > 1 ? ` | every ${frame.stride}` : "";
                frameLabel.textContent = `Frame ${index + 1} / ${currentSequence.frame_count}${strideLabel}`;
                preloadNearbyFrames(index, direction, frame.stride);

                const cachedEntry = getImageCacheEntry(imageUrl);
                if (cachedEntry && cachedEntry.loaded && cachedEntry.image.naturalWidth) {
                    activeImage = cachedEntry.image;
                    lastDrawnImageUrl = imageUrl;
                    drawAsset(activeImage, activeImage.naturalWidth, activeImage.naturalHeight, imageUrl);
                    return;
                }

                const fallback = nearestLoadedFrame(index, direction, frame.stride);
                if (fallback) {
                    frameLabel.textContent = `Frame ${fallback.index + 1} / ${currentSequence.frame_count}${strideLabel}`;
                    activeImage = fallback.image;
                    lastDrawnImageUrl = fallback.url;
                    drawAsset(fallback.image, fallback.image.naturalWidth, fallback.image.naturalHeight, fallback.url);
                }

                requestImage(imageUrl, (image) => {
                    if (!currentState || !currentSequence) {
                        return;
                    }
                    const latestDirection = movementDirectionForState(currentState, estimatedPositionPct());
                    const latestFrame = frameIndexForSequencePosition(currentSequence, estimatedPositionPct(), latestDirection || 1);
                    if (latestFrame != null && imageUrl === currentSequence.frame_urls[latestFrame.index]) {
                        activeImage = image;
                        lastDrawnImageUrl = imageUrl;
                        drawAsset(image, image.naturalWidth, image.naturalHeight, imageUrl);
                    }
                });
                return;
            }

            const videoRatio = playbackRatioForPosition(currentSequence, displayPositionPct);
            if (videoRatio == null) {
                frameLabel.textContent = "Outside clip";
                clearCanvas();
                return;
            }

            frameLabel.textContent = Number.isFinite(hiddenVideo.duration) && hiddenVideo.duration > 0
                ? `${Math.round(videoRatio * 100)}% through clip`
                : "Loading clip...";

            if (Number.isFinite(hiddenVideo.duration) && hiddenVideo.duration > 0) {
                const targetTime = videoRatio * hiddenVideo.duration;
                if (Math.abs(hiddenVideo.currentTime - targetTime) > 0.033) {
                    try {
                        hiddenVideo.currentTime = targetTime;
                    } catch (error) {}
                } else {
                    drawAsset(hiddenVideo, hiddenVideo.videoWidth, hiddenVideo.videoHeight);
                }
                return;
            }

            clearCanvas();
        }

        async function applyState(state) {
            currentState = state;
            lastStateReceivedAtMs = performance.now();
            if ((state.selected_sequence_id || null) !== currentSequenceId) {
                await loadSequence(state.selected_sequence_id);
            } else {
                syncSequenceMetadataFromState(currentSequence, state);
            }
            scheduleRender();
        }

        async function refreshStateLoop() {
            let nextPollMs = 500;
            try {
                const state = await apiGet("/api/state");
                await applyState(state);
                nextPollMs = state.is_moving || state.is_cycling || state.countdown_remaining > 0 || state.switch_direction !== 0 ? 120 : 500;
            } catch (error) {
                if (showHud) {
                    modeLabel.textContent = "Connection lost";
                }
                clearCanvas();
                nextPollMs = 1000;
            } finally {
                setTimeout(refreshStateLoop, nextPollMs);
            }
        }

        async function armDisplay() {
            if (document.fullscreenElement == null && document.documentElement.requestFullscreen) {
                try { await document.documentElement.requestFullscreen(); } catch (error) {}
            }
            if ("wakeLock" in navigator) {
                try { wakeLock = await navigator.wakeLock.request("screen"); } catch (error) {}
            }
        }

        hiddenVideo.addEventListener("loadedmetadata", drawCurrentFrame);
        hiddenVideo.addEventListener("seeked", () => {
            if (!currentState || !currentSequence || currentSequence.kind !== "video") {
                return;
            }
            if (playbackRatioForPosition(currentSequence, estimatedPositionPct()) == null) {
                clearCanvas();
                return;
            }
            drawAsset(hiddenVideo, hiddenVideo.videoWidth, hiddenVideo.videoHeight);
        });
        hiddenVideo.addEventListener("loadeddata", drawCurrentFrame);
        armButton.addEventListener("click", armDisplay);
        window.addEventListener("resize", resizeCanvas);
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible" && wakeLock == null) {
                armDisplay();
            }
        });

        resizeCanvas();
        refreshStateLoop();
    </script>
</body>
</html>
